<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BurgisBurgersBros</title>
<link rel="stylesheet" href="styles.css">

<style>
#lockscreen{
  position:fixed;
  inset:0;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999999;
}
#lockscreen input{
  padding:10px;
  font-size:16px;
  margin-top:10px;
}
#lockscreen button{
  padding:10px 20px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔒 LOCKSCREEN -->
<div id="lockscreen">
  <h2>🔒 Geschützter Bereich</h2>
  <input type="password" id="pwInput" placeholder="Passwort">
  <button id="loginBtn">Login</button>
  <p id="msg" style="color:red;"></p>
</div>

<!-- ================= WEBSITE ================= -->
<header>
<nav>
<h2>BurgisBurgersBros</h2>
<div>💰 Guthaben: <span id="balance">0</span> Fluffycoins</div>
<a href="status/index.html">Status</a>
</nav>
<div class="hero">
<h1>Bestellen nur zum Spaß 🍔</h1>
</div>
</header>

<div class="products" id="products"></div>

<section id="cart">
<h3>Warenkorb</h3>
<ul id="cartItems"></ul>
<p><b>Gesamt:</b> <span id="total">0</span> FC</p>
<button id="orderBtn">Bestellen</button>
</section>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBUH7HWWhA-cHllde7Yy0YNwnG34lawG6g",
    authDomain: "mcking-659b6.firebaseapp.com",
    databaseURL: "https://mcking-659b6-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mcking-659b6",
    storageBucket: "mcking-659b6.firebasestorage.app",
    messagingSenderId: "1086112729985",
    appId: "1:1086112729985:web:7deed0bbf08412d150b680"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  /* ================= PASSWORT SCHUTZ ================= */
  const lock = document.getElementById("lockscreen");
  const msg  = document.getElementById("msg");

  // Seite blockieren
  document.body.style.overflow = "hidden";

  // Verstecktes Passwort (Base64-kodiert: "changeme" -> "Y2hhbmdlbWU=")
  const hiddenPw = "Y2hhbmdlbWU="; // Ändern Sie dies zu Ihrem eigenen Base64-kodierten Passwort
  const realPw = atob(hiddenPw); // Dekodieren zur Laufzeit

  // LOGIN
  document.getElementById("loginBtn").onclick = () => {
    const input = document.getElementById("pwInput").value;

    if (input === realPw) {
      // Lockscreen schließen und Seite freigeben
      lock.remove();
      document.body.style.overflow = "auto";
    } else {
      msg.innerText = "Falsches Passwort";
    }
  };

  /* ================= WALLET ================= */
  const balanceEl = document.getElementById("balance");
  const balanceRef = ref(db, "wallet/balance");
  onValue(balanceRef, snap => {
    if (!snap.exists()) {
      set(ref(db, "wallet"), { balance: 500 });
      balanceEl.textContent = 500;
    } else {
      balanceEl.textContent = snap.val();
    }
  });

  /* ================= PRODUKTE ================= */
  const productNames = [
  "Boing Schriftmuster","Strand","Waldweg","Katze spielt Gitarre","Hund",
  "Scateboard Fahrer","Fußball Spieler","Rollschuh Fahrerin","Roboter","Tänzerin",
  ];

  const productsDiv = document.getElementById("products");
  const cartItemsEl = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");
  const orderBtn = document.getElementById("orderBtn");

  let cart = [];
  let total = 0;

  function renderCart(){
    cartItemsEl.innerHTML="";
    cart.forEach(i=>{
      const li=document.createElement("li");
      li.textContent=`${i.name} – ${i.price} FC`;
      cartItemsEl.appendChild(li);
    });
    totalEl.textContent=total;
  }

  productNames.forEach(name=>{
    const price=Math.floor(Math.random()*21)+5;
    const div=document.createElement("div");
    div.className="product";
    div.innerHTML=`<h3>${name}</h3><p>${price} FC</p><button>+</button>`;
    div.querySelector("button").onclick=()=>{
      cart.push({name,price});
      total+=price;
      renderCart();
    };
    productsDiv.appendChild(div);
  });

  /* ================= BESTELLEN ================= */
  orderBtn.onclick=()=>{
    if(cart.length===0) return;

    get(ref(db, "wallet/balance")).then(snap=>{
      if(snap.val()<total) return alert("Zu wenig Fluffycoins");

      const nr=Math.floor(100+Math.random()*900);
      set(ref(db, "orders/"+nr), {
        items:cart,
        totalFC:total,
        status:"In Zubereitung",
        npc:false
      });

      set(ref(db, "wallet/balance"), snap.val()-total);
      alert("Bestellung #" + nr + " erfolgreich!"); // Bestellnummer anzeigen
      cart=[]; total=0; renderCart();
    });
  };

/* ================= NPCs ================= */
setInterval(()=>{
  const nr = Math.floor(100 + Math.random() * 900);
  const count = 1; // NPC bestellt immer nur 1 Produkt
  let items = [], sum = 0;

  for(let i = 0; i < count; i++){
    const name = productNames[Math.floor(Math.random() * productNames.length)];
    const price = Math.floor(Math.random() * 21) + 5;

    items.push({ name, price });
    sum += price;
  }

  set(ref(db, "orders/" + nr), {
    items,
    totalFC: sum,
    status: "In Zubereitung",
    npc: true
  });

}, 300000); // 5 Minuten = 300000 ms
</script>

</body>
</html>
